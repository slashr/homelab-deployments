apiVersion: apps/v1
kind: Deployment
metadata:
  name: kash
  namespace: kash
  labels:
    app: kash
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kash
  template:
    metadata:
      labels:
        app: kash
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kash
          image: docker.io/dawker/kash:896593e42abe47e2db82565e7108e3a26c149e75
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8765
              protocol: TCP
          env:
            - name: KALSHI_API_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: kash-secrets
                  key: KALSHI_API_KEY_ID
            - name: KALSHI_PRIVATE_KEY_PATH
              value: /var/run/kash/private-key.pem
            - name: KALSHI_BASE_URL
              value: https://api.elections.kalshi.com
            - name: KASH_HOST
              value: 0.0.0.0
            - name: KASH_PORT
              value: "8765"
            - name: KASH_JOURNAL_DB
              value: /data/kalshi.sqlite
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: private-key
              mountPath: /var/run/kash
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kash-data
        - name: private-key
          secret:
            secretName: kash-secrets
            items:
              - key: private-key.pem
                path: private-key.pem
                mode: 0400
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
