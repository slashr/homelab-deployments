apiVersion: apps/v1
kind: Deployment
metadata:
  name: kash-auto-runner
  namespace: kash
  labels:
    app: kash
    component: auto-runner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kash
      component: auto-runner
  template:
    metadata:
      labels:
        app: kash
        component: auto-runner
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auto-runner
          image: docker.io/dawker/kash:936db5d65b129b513c6dfa4758416b7b0e2cea15
          imagePullPolicy: Always
          command:
            - python
            - -u
            - -m
            - kalshi_tools
            - --journal-db
            - /data/kalshi.sqlite
            - auto-operate
            - --mode
            - safe
            - --per-bet-budget
            - "1.0"
            - --min-bet-budget
            - "0.75"
            - --max-open-exposure
            - "4.0"
            - --max-open-positions
            - "4"
            - --max-open-orders
            - "2"
            - --balance-buffer
            - "0.25"
            - --poll-seconds
            - "180"
            - --prefer-maker
            - --sync-outcomes
            - --save-position-snapshots
          env:
            - name: KALSHI_API_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: kash-secrets
                  key: KALSHI_API_KEY_ID
            - name: KALSHI_PRIVATE_KEY_PATH
              value: /var/run/kash/private-key.pem
            - name: KALSHI_BASE_URL
              value: https://api.elections.kalshi.com
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: private-key
              mountPath: /var/run/kash
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kash-data
        - name: private-key
          secret:
            secretName: kash-secrets
            items:
              - key: private-key.pem
                path: private-key.pem
                mode: 0400
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
