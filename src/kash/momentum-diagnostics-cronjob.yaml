apiVersion: batch/v1
kind: CronJob
metadata:
  name: kash-momentum-diagnostics
  namespace: kash
  labels:
    app: kash
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: kash
            job: momentum-diagnostics
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: collect-diagnostics
              image: docker.io/dawker/kash:2391b818d57f5c02bc6a60234f9a70b1a83a2969
              imagePullPolicy: Always
              command:
                - python
                - -m
                - kalshi_tools
                - --journal-db
                - /data/kalshi.sqlite
                - crypto-diagnostics
                - --save
                - --budget
                - "4"
                - --hours
                - "2"
                - --min-seconds-to-close
                - "60"
                - --max-seconds-to-close
                - "1800"
                - --min-open-interest
                - "0"
                - --limit
                - "8"
              env:
                - name: KALSHI_API_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: kash-secrets
                      key: KALSHI_API_KEY_ID
                - name: KALSHI_PRIVATE_KEY_PATH
                  value: /var/run/kash/private-key.pem
                - name: KALSHI_BASE_URL
                  value: https://api.elections.kalshi.com
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: private-key
                  mountPath: /var/run/kash
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: kash-data
            - name: private-key
              secret:
                secretName: kash-secrets
                items:
                  - key: private-key.pem
                    path: private-key.pem
                    mode: 0400
            - name: tmp
              emptyDir:
                sizeLimit: 128Mi
